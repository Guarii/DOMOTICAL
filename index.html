<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomóticaHub - Sincronizado en la Nube</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --primary: #1a73e8;
            --primary-container: #d3e3fd;
            --surface: #f8f9fa;
            --on-surface: #1f1f1f;
            --glass: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-pill: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
            line-height: 1.4;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #d3e3fd 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #fce8e6 0%, transparent 40%);
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        header {
            position: sticky; top: 0; z-index: 100;
            padding: 16px 5%; display: flex; align-items: center;
            justify-content: space-between; gap: 20px;
        }

        .logo { font-size: 1.5rem; font-weight: 700; text-decoration: none; color: var(--on-surface); display: flex; align-items: center; gap: 8px; }
        .search-container { flex: 1; max-width: 500px; position: relative; }
        .search-container input { width: 100%; padding: 12px 20px 12px 45px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: rgba(255,255,255,0.6); font-family: inherit; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary); background: white; }
        .search-container .material-symbols-rounded { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }
        .actions { display: flex; gap: 8px; }
        .btn-icon { width: 45px; height: 45px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .btn-icon:hover { background: rgba(0,0,0,0.05); }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--primary); color: white; font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .tabs { padding: 15px 5%; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 20px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.5); border: 1px solid var(--border); cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: 500; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        main { padding: 0 5% 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { border-radius: var(--radius-xl); overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: 600; font-size: 1.1rem; margin: 5px 0; }
        .card-desc { font-size: 0.85rem; color: #666; margin-bottom: 15px; flex: 1; }
        .price { font-weight: 700; font-size: 1.2rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-pill); cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px;}
        .overlay.active { display: flex; }
        .modal { width: 100%; max-width: 550px; max-height: 85vh; border-radius: var(--radius-xl); padding: 30px; overflow-y: auto; position: relative; }
        .close { position: absolute; top: 20px; right: 20px; cursor: pointer; }

        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 50px; height: 50px; border-radius: 8px; }
        .qty-ctrl { display: flex; align-items: center; gap: 10px; background: #eee; padding: 5px 12px; border-radius: 20px; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; }
        .btn-full { width: 100%; padding: 12px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid #eee; }
        .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 20px; }
        .chip { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: var(--primary-container); color: var(--primary); border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
        .chip span { cursor: pointer; font-size: 14px; }

        /* Nuevos estilos para checkboxes y etiquetas de los productos */
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 5px; margin-bottom: 15px;}
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
        .checkbox-label input { width: auto; margin: 0; }
        .filter-title { padding: 0 5%; font-weight: 600; font-size: 0.9rem; color: #555; margin-top: 15px; margin-bottom: 5px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .tag-room { background: #e8f0fe; color: #1a73e8; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .tag-type { background: #fce8e6; color: #d93025; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 10px 20px; border-radius: 50px; transition: 0.4s; z-index: 2000; }
        #toast.active { transform: translateX(-50%) translateY(0); }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid var(--primary-container);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 style="color: var(--primary)">Conectando con la nube...</h3>
        <p style="font-size: 0.8rem; color: #666; margin-top: 5px;" id="loadingMsg">Cargando base de datos</p>
    </div>

    <div class="ambient-bg"></div>

    <header class="glass">
        <a href="#" class="logo" onclick="location.reload()">
            <span class="material-symbols-rounded">nest_eco_leaf</span> DomóticaHub
        </a>
        <div class="search-container">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="searchInput" placeholder="Buscar dispositivos..." oninput="window.ui.renderProducts()">
        </div>
        <div class="actions">
            <button class="btn-icon" onclick="window.ui.toggleModal('cartModal', true)">
                <span class="material-symbols-rounded">shopping_bag</span>
                <span class="badge" id="cartBadge">0</span>
            </button>
            <button class="btn-icon" onclick="window.ui.toggleModal('adminLoginModal', true)">
                <span class="material-symbols-rounded">settings</span>
            </button>
        </div>
    </header>

    <div class="filter-title">Filtrar por Habitación:</div>
    <nav class="tabs" id="roomTabs"></nav>
    <div class="filter-title">Filtrar por Tipo de Dispositivo:</div>
    <nav class="tabs" id="typeTabs"></nav>
    
    <main id="productGrid"></main>

    <!-- Modal Carrito -->
    <div class="overlay" id="cartModal">
        <div class="modal glass">
            <span class="material-symbols-rounded close" onclick="window.ui.toggleModal('cartModal', false)">close</span>
            <h2>Mi Cesta</h2>
            <div id="cartContent" style="margin: 20px 0;"></div>
            <div id="cartFooter"></div>
            <button class="btn-full" onclick="window.ui.checkout()">Finalizar Compra</button>
        </div>
    </div>

    <!-- Modal Login -->
    <div class="overlay" id="adminLoginModal">
        <div class="modal glass" style="max-width: 350px;">
            <span class="material-symbols-rounded close" onclick="window.ui.toggleModal('adminLoginModal', false)">close</span>
            <h2 style="text-align:center; margin-bottom: 20px;">Administración</h2>
            <input type="password" id="adminPass" placeholder="Contraseña (admin)">
            <button class="btn-full" onclick="window.ui.login()">Acceder</button>
        </div>
    </div>

    <div class="overlay" id="adminDashboard">
        <div class="modal glass">
            <span class="material-symbols-rounded close" onclick="window.ui.toggleModal('adminDashboard', false)">close</span>
            
            <h3>Gestionar Habitaciones</h3>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="newRoomInput" placeholder="Ej: Salón, Cocina, Exterior...">
                <button class="btn-full" style="width:auto; margin:0; padding:0 20px;" onclick="window.ui.addCategory('room')">Añadir</button>
            </div>
            <div id="adminRoomList" class="chip-list"></div>

            <hr style="opacity:0.1; margin:20px 0;">

            <h3>Gestionar Tipos de Dispositivo</h3>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="newTypeInput" placeholder="Ej: Iluminación, Seguridad...">
                <button class="btn-full" style="width:auto; margin:0; padding:0 20px;" onclick="window.ui.addCategory('type')">Añadir</button>
            </div>
            <div id="adminTypeList" class="chip-list"></div>

            <hr style="opacity:0.1; margin:20px 0;">

            <h3 id="formTitle">Nuevo Producto</h3>
            <div style="margin-top:15px;">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="pTitle">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="pDesc" rows="2"></textarea>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="form-group"><label>Precio (€)</label><input type="number" id="pPrice" step="0.01"></div>
                    <div class="form-group"><label>Imagen (URL)</label><input type="text" id="pImg"></div>
                </div>
                
                <div class="form-group">
                    <label>Asignar Habitaciones</label>
                    <div id="pRoomsCheckboxes" class="checkbox-grid"></div>
                </div>
                
                <div class="form-group">
                    <label>Asignar Tipos de Dispositivo</label>
                    <div id="pTypesCheckboxes" class="checkbox-grid"></div>
                </div>

                <button class="btn-full" id="saveBtn" onclick="window.ui.saveProduct()">Guardar Producto</button>
                <button class="btn-full" id="cancelBtn" style="display:none; background:#888;" onclick="window.ui.resetForm()">Cancelar</button>
            </div>

            <hr style="opacity:0.1; margin:20px 0;">
            <h3>Lista de Productos</h3>
            <div id="adminProductList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        // Importamos Firebase SDK desde CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==============================================================================
        // ⚠️ ATENCIÓN: PEGA AQUÍ LA CONFIGURACIÓN DE TU PROYECTO DE FIREBASE ⚠️
        // ==============================================================================
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        // ==============================================================================

        let db;
        let isFirebaseActive = true;

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            if(firebaseConfig.apiKey === "TU_API_KEY"){
                isFirebaseActive = false;
            }
        } catch(e) {
            console.error("Error iniciando Firebase", e);
            isFirebaseActive = false;
        }

        const store = {
            products: [],
            rooms: ['Salón', 'Cocina', 'Dormitorio', 'Exterior'], // Bloque de categorías 1
            types: ['Seguridad', 'Iluminación', 'Climatización', 'Energía'], // Bloque de categorías 2
            cart: [], // El carrito SIEMPRE se queda en LocalStorage
            activeRoom: 'Todas',
            activeType: 'Todos',

            async init() {
                // Cargar carrito del usuario (memoria local)
                const savedCart = localStorage.getItem('dh_cart_cloud');
                if (savedCart) this.cart = JSON.parse(savedCart);

                if (!isFirebaseActive) {
                    document.getElementById('loadingMsg').textContent = "⚠️ Faltan las claves de Firebase. Usando datos de prueba locales.";
                    this.loadMockData();
                    setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 2000);
                    return;
                }

                try {
                    // 1. Cargar Categorías desde Firestore
                    const catDoc = await getDoc(doc(db, "config", "categories"));
                    if (catDoc.exists()) {
                        const data = catDoc.data();
                        // Migración automática para datos antiguos (convierte viejas categorías a tipos)
                        if (data.list && !data.types) {
                            this.types = data.list;
                            await setDoc(doc(db, "config", "categories"), { rooms: this.rooms, types: this.types });
                        } else {
                            this.rooms = data.rooms || this.rooms;
                            this.types = data.types || this.types;
                        }
                    } else {
                        // Crear documento de categorías por defecto si no existe
                        await setDoc(doc(db, "config", "categories"), { rooms: this.rooms, types: this.types });
                    }

                    // 2. Cargar Productos desde Firestore
                    const querySnapshot = await getDocs(collection(db, "products"));
                    this.products = [];
                    querySnapshot.forEach((doc) => {
                        this.products.push({ dbId: doc.id, ...doc.data() });
                    });

                } catch (error) {
                    console.error("Error leyendo Firestore:", error);
                    alert("Error de conexión a la base de datos. Comprueba los permisos de Firestore.");
                    this.loadMockData();
                }

                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
            },

            loadMockData() {
                this.products = [
                    { dbId: 'mock1', id: 1, title: 'Cámara Nube Pro', desc: 'Datos de prueba sin conexión.', price: 95.00, img: 'https://images.unsplash.com/photo-1557324232-b8917d3c3dcb?w=400', cat: 'Seguridad' },
                    { dbId: 'mock2', id: 2, title: 'Enchufe Nube', desc: 'Datos de prueba sin conexión.', price: 19.90, img: 'https://images.unsplash.com/photo-1558089687-f282ffcbc126?w=400', cat: 'Energía' }
                ];
                if(!this.categories.includes('Energía')) this.categories.push('Energía');
            },

            saveCart() {
                localStorage.setItem('dh_cart_cloud', JSON.stringify(this.cart));
            },

            async saveCategories() {
                if(!isFirebaseActive) return;
                await setDoc(doc(db, "config", "categories"), { rooms: this.rooms, types: this.types });
            },

            async addProduct(pData) {
                if(!isFirebaseActive) { this.products.unshift({dbId: 'temp', ...pData}); return; }
                const docRef = await addDoc(collection(db, "products"), pData);
                this.products.unshift({ dbId: docRef.id, ...pData });
            },

            async updateProduct(dbId, pData) {
                if(!isFirebaseActive) {
                    const idx = this.products.findIndex(x => x.dbId === dbId);
                    this.products[idx] = {dbId, ...pData};
                    return;
                }
                const pRef = doc(db, "products", dbId);
                await updateDoc(pRef, pData);
                const idx = this.products.findIndex(x => x.dbId === dbId);
                this.products[idx] = { dbId, ...pData };
            },

            async deleteProductFromDb(dbId) {
                if(!isFirebaseActive) {
                    this.products = this.products.filter(x => x.dbId !== dbId);
                    return;
                }
                await deleteDoc(doc(db, "products", dbId));
                this.products = this.products.filter(x => x.dbId !== dbId);
            }
        };

        const ui = {
            async init() {
                await store.init();
                this.renderAll();
                if(!isFirebaseActive) this.toast("Modo Offline: Configura Firebase en el código");
            },

            renderAll() {
                this.renderTabs();
                this.renderProducts();
                this.updateCart();
                this.updateAdminView();
            },

            renderTabs() {
                const roomContainer = document.getElementById('roomTabs');
                const roomList = ['Todas', ...store.rooms];
                roomContainer.innerHTML = roomList.map(c => `
                    <div class="tab ${store.activeRoom === c ? 'active' : ''}" onclick="window.ui.setFilter('room', '${c}')">${c}</div>
                `).join('');

                const typeContainer = document.getElementById('typeTabs');
                const typeList = ['Todos', ...store.types];
                typeContainer.innerHTML = typeList.map(c => `
                    <div class="tab ${store.activeType === c ? 'active' : ''}" onclick="window.ui.setFilter('type', '${c}')">${c}</div>
                `).join('');
            },

            setFilter(type, value) {
                if(type === 'room') store.activeRoom = value;
                if(type === 'type') store.activeType = value;
                this.renderTabs();
                this.renderProducts();
            },

            renderProducts() {
                const grid = document.getElementById('productGrid');
                const query = document.getElementById('searchInput').value.toLowerCase();
                
                const filtered = store.products.filter(p => {
                    // Soporte para productos antiguos (que solo tenían p.cat)
                    const pTypes = p.types || (p.cat ? [p.cat] : []);
                    const pRooms = p.rooms || [];

                    const mRoom = store.activeRoom === 'Todas' || pRooms.includes(store.activeRoom);
                    const mType = store.activeType === 'Todos' || pTypes.includes(store.activeType);
                    const mSearch = p.title.toLowerCase().includes(query);
                    
                    return mRoom && mType && mSearch;
                });

                grid.innerHTML = filtered.map(p => {
                    const pTypes = p.types || (p.cat ? [p.cat] : []);
                    const pRooms = p.rooms || [];
                    
                    const roomTags = pRooms.map(r => `<span class="tag-room">${r}</span>`).join('');
                    const typeTags = pTypes.map(t => `<span class="tag-type">${t}</span>`).join('');

                    return `
                    <div class="card glass">
                        <img src="${p.img}" class="card-img">
                        <div class="card-body">
                            <div class="card-tags">${roomTags} ${typeTags}</div>
                            <h3 class="card-title">${p.title}</h3>
                            <p class="card-desc">${p.desc}</p>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="price">${p.price.toFixed(2)}€</span>
                                <button class="btn-add" onclick="window.ui.addToCart('${p.dbId}')">Añadir</button>
                            </div>
                        </div>
                    </div>
                    `
                }).join('');
            },

            addToCart(dbId) {
                const p = store.products.find(x => x.dbId === dbId);
                const item = store.cart.find(x => x.dbId === dbId);
                if (item) item.qty++;
                else store.cart.push({ ...p, qty: 1 });
                store.saveCart();
                this.updateCart();
                this.toast('Añadido a la cesta');
            },

            updateCart() {
                document.getElementById('cartBadge').textContent = store.cart.reduce((a, b) => a + b.qty, 0);
                const container = document.getElementById('cartContent');
                if (store.cart.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#888;">Vacío</p>';
                    document.getElementById('cartFooter').innerHTML = '';
                } else {
                    container.innerHTML = store.cart.map(i => `
                        <div class="cart-item">
                            <img src="${i.img}">
                            <div style="flex:1">
                                <div style="font-weight:600; font-size:0.9rem;">${i.title}</div>
                                <div style="font-size:0.8rem; color:#666;">${i.price.toFixed(2)}€</div>
                            </div>
                            <div class="qty-ctrl">
                                <button onclick="window.ui.changeQty('${i.dbId}', -1)" style="border:0;background:0;cursor:pointer;">-</button>
                                <span>${i.qty}</span>
                                <button onclick="window.ui.changeQty('${i.dbId}', 1)" style="border:0;background:0;cursor:pointer;">+</button>
                            </div>
                        </div>
                    `).join('');
                    const total = store.cart.reduce((a, b) => a + (b.price * b.qty), 0);
                    document.getElementById('cartFooter').innerHTML = `<div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.2rem; margin-top:15px; border-top:1px solid #eee; padding-top:15px;"><span>Total</span><span>${total.toFixed(2)}€</span></div>`;
                }
            },

            changeQty(dbId, d) {
                const i = store.cart.find(x => x.dbId === dbId);
                i.qty += d;
                if (i.qty <= 0) store.cart = store.cart.filter(x => x.dbId !== dbId);
                store.saveCart();
                this.updateCart();
            },

            checkout() {
                if (store.cart.length === 0) return;
                this.toast('¡Pedido procesado!');
                store.cart = [];
                store.saveCart();
                this.updateCart();
                this.toggleModal('cartModal', false);
            },

            login() {
                const p = document.getElementById('adminPass').value;
                if (p === 'admin' || p === '') {
                    this.toggleModal('adminLoginModal', false);
                    this.toggleModal('adminDashboard', true);
                    this.updateAdminView();
                } else this.toast('Clave incorrecta');
            },

            updateAdminView() {
                const rList = document.getElementById('adminRoomList');
                rList.innerHTML = store.rooms.map(c => `
                    <div class="chip">${c} <span class="material-symbols-rounded" onclick="window.ui.removeCategory('room', '${c}')">close</span></div>
                `).join('');

                const tList = document.getElementById('adminTypeList');
                tList.innerHTML = store.types.map(c => `
                    <div class="chip">${c} <span class="material-symbols-rounded" onclick="window.ui.removeCategory('type', '${c}')">close</span></div>
                `).join('');

                const rCheckboxes = document.getElementById('pRoomsCheckboxes');
                rCheckboxes.innerHTML = store.rooms.map(c => `
                    <label class="checkbox-label"><input type="checkbox" class="cb-room" value="${c}"> ${c}</label>
                `).join('');

                const tCheckboxes = document.getElementById('pTypesCheckboxes');
                tCheckboxes.innerHTML = store.types.map(c => `
                    <label class="checkbox-label"><input type="checkbox" class="cb-type" value="${c}"> ${c}</label>
                `).join('');

                const pList = document.getElementById('adminProductList');
                pList.innerHTML = store.products.map(p => {
                    const pTypes = p.types || (p.cat ? [p.cat] : []);
                    const tags = [...(p.rooms || []), ...pTypes].join(', ');
                    return `
                    <div class="admin-item" style="flex-direction:column; align-items:flex-start;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <span style="font-weight:600;">${p.title}</span>
                            <div style="display:flex; gap:10px;">
                                <span class="material-symbols-rounded" style="color:var(--primary); cursor:pointer;" onclick="window.ui.editProduct('${p.dbId}')">edit</span>
                                <span class="material-symbols-rounded" style="color:#ea4335; cursor:pointer;" onclick="window.ui.deleteProduct('${p.dbId}')">delete</span>
                            </div>
                        </div>
                        <div style="font-size:0.75rem; color:#666; margin-top:5px;">${tags || 'Sin categorizar'}</div>
                    </div>
                    `
                }).join('');
            },

            async addCategory(listType) {
                const isRoom = listType === 'room';
                const input = document.getElementById(isRoom ? 'newRoomInput' : 'newTypeInput');
                const val = input.value.trim();
                const targetList = isRoom ? store.rooms : store.types;

                if (val && !targetList.includes(val)) {
                    targetList.push(val);
                    await store.saveCategories();
                    input.value = '';
                    this.renderAll();
                    this.toast('Categoría añadida a la nube');
                }
            },

            async removeCategory(listType, c) {
                if (!confirm(`¿Eliminar categoría "${c}"? Los productos vinculados conservarán la etiqueta pero no podrás filtrar por ella.`)) return;
                
                if (listType === 'room') {
                    store.rooms = store.rooms.filter(x => x !== c);
                } else {
                    store.types = store.types.filter(x => x !== c);
                }
                
                await store.saveCategories();
                this.renderAll();
                this.toast('Categoría eliminada de la nube');
            },

            async saveProduct() {
                const dbId = document.getElementById('editId').value;
                const btn = document.getElementById('saveBtn');
                
                // Extraer todos los checkboxes seleccionados
                const selectedRooms = Array.from(document.querySelectorAll('.cb-room:checked')).map(cb => cb.value);
                const selectedTypes = Array.from(document.querySelectorAll('.cb-type:checked')).map(cb => cb.value);

                const pData = {
                    title: document.getElementById('pTitle').value,
                    desc: document.getElementById('pDesc').value,
                    price: parseFloat(document.getElementById('pPrice').value || 0),
                    img: document.getElementById('pImg').value || 'https://images.unsplash.com/photo-1558089687-f282ffcbc126?w=200',
                    rooms: selectedRooms,
                    types: selectedTypes,
                    timestamp: Date.now()
                };

                if (!pData.title) return this.toast('Faltan el título del producto');
                if (selectedRooms.length === 0 && selectedTypes.length === 0) return this.toast('Marca al menos una categoría de algún bloque');

                btn.textContent = 'Guardando en la Nube...';
                btn.style.opacity = '0.7';

                if (dbId) {
                    // Si ya tenía el campo viejo "cat", podemos limpiar el documento base, o simplemente actualizar.
                    await store.updateProduct(dbId, pData);
                    this.toast('Actualizado en la nube');
                } else {
                    await store.addProduct(pData);
                    this.toast('Creado en la nube');
                }

                this.resetForm();
                this.renderAll();
                btn.textContent = 'Guardar Producto';
                btn.style.opacity = '1';
            },

            editProduct(dbId) {
                const p = store.products.find(x => x.dbId === dbId);
                document.getElementById('editId').value = p.dbId;
                document.getElementById('pTitle').value = p.title;
                document.getElementById('pDesc').value = p.desc;
                document.getElementById('pPrice').value = p.price;
                document.getElementById('pImg').value = p.img;
                
                // Manejar productos viejos con p.cat o nuevos con arrays
                const pTypes = p.types || (p.cat ? [p.cat] : []);
                const pRooms = p.rooms || [];
                
                // Marcar dinámicamente los checkboxes según las arrays del producto
                document.querySelectorAll('.cb-room').forEach(cb => cb.checked = pRooms.includes(cb.value));
                document.querySelectorAll('.cb-type').forEach(cb => cb.checked = pTypes.includes(cb.value));
                
                document.getElementById('formTitle').textContent = 'Editar Producto';
                document.getElementById('saveBtn').textContent = 'Actualizar en la Nube';
                document.getElementById('cancelBtn').style.display = 'block';
            },

            async deleteProduct(dbId) {
                if (!confirm('¿Borrar este producto para todos los usuarios?')) return;
                await store.deleteProductFromDb(dbId);
                this.renderAll();
                this.toast('Borrado de la nube');
            },

            resetForm() {
                document.getElementById('editId').value = '';
                document.getElementById('pTitle').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
                
                // Limpiar todos los checkboxes
                document.querySelectorAll('.cb-room').forEach(cb => cb.checked = false);
                document.querySelectorAll('.cb-type').forEach(cb => cb.checked = false);

                document.getElementById('formTitle').textContent = 'Nuevo Producto';
                document.getElementById('saveBtn').textContent = 'Guardar Producto';
                document.getElementById('cancelBtn').style.display = 'none';
            },

            toggleModal(id, show) {
                document.getElementById(id).style.display = show ? 'flex' : 'none';
            },

            toast(m) {
                const t = document.getElementById('toast');
                t.textContent = m;
                t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 3500);
            }
        };

        // Exportamos a window para que los botones HTML puedan llamar a las funciones
        window.ui = ui;
        window.onload = () => window.ui.init();
    </script>
</body>
</html>
